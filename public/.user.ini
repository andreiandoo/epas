; Per-directory PHP overrides pentru core.tixello.com (Filament admin).
; PHP-FPM citeste .user.ini din document root la fiecare request (refresh
; intern: user_ini.cache_ttl, default 300s). Override-urile se aplica DOAR
; pe acest site, fara a modifica php.ini global.
;
; Motiv: EventResource (Filament 4) are 11 tab-uri si ~10 Repeater-uri
; nested (Bilete, Conținut, Vânzări, etc.) care instantiaza prea multe
; obiecte Schema pentru limita default de 512M. Documentatia Filament
; recomanda minim 512M-1024M pentru admin-uri bogate.

memory_limit = 1024M

; Filament forms pot avea payload-uri Livewire mari (form snapshots).
; Default 8M e prea putin pentru EditEvent cu multe TicketTypes.
post_max_size = 64M
upload_max_filesize = 64M
